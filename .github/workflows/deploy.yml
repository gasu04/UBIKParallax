name: Build & Deploy Digital Garden

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build notes from vault
        run: node scripts/build-notes.mjs

      - name: Build site
        run: npx vite build --base=/UBIKParallax/

      - name: Prepare deploy directory
        run: |
          BUILD_DIR="dist/public"
          rm -rf "$BUILD_DIR/__manus__"
          python3 scripts/clean-html.py "$BUILD_DIR"
          touch "$BUILD_DIR/.nojekyll"
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html"
          echo "Deploy directory contents:"
          ls -la "$BUILD_DIR"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
